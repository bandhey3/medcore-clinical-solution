
server:
  port: 3001

spring:
  application:
    name: medcore-clinical-solution
  thymeleaf:
    cache: false

  datasource:
    url: jdbc:postgresql://localhost:5432/contact_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use validate in production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always