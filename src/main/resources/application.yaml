server:
  port: ${PORT:3001}

spring:
  application:
    name: medcore-clinical-solution

  thymeleaf:
    cache: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/contact_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always